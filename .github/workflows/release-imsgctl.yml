name: release-imsgctl

on:
  push:
    tags:
      - "imsgctl/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: imsgctl/go.mod
          cache-dependency-path: imsgctl/go.sum

      - name: Derive release variables
        run: |
          version="${RELEASE_TAG#imsgctl/}"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG_ENCODED=${RELEASE_TAG//\//%2F}" >> "$GITHUB_ENV"
          git tag -f "$version" "$GITHUB_SHA"

      - name: Build release artifacts
        uses: goreleaser/goreleaser-action@v6
        env:
          GORELEASER_CURRENT_TAG: ${{ env.VERSION }}
          RELEASE_TAG_ENCODED: ${{ env.RELEASE_TAG_ENCODED }}
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: imsgctl
          args: release --clean

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "imsgctl $VERSION" \
              --notes "Release $VERSION"
          fi
          gh release upload "$RELEASE_TAG" imsgctl/dist/*.tar.gz imsgctl/dist/checksums.txt --clobber

      - name: Clone tap repository
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/jpreagan/homebrew-tap.git" /tmp/homebrew-tap

      - name: Update Homebrew formula
        run: cp imsgctl/dist/homebrew/Formula/imsgctl.rb /tmp/homebrew-tap/Formula/imsgctl.rb

      - name: Push tap update
        working-directory: /tmp/homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/imsgctl.rb
          if git diff --cached --quiet; then
            echo "formula unchanged"
            exit 0
          fi
          git commit -m "imsgctl ${VERSION#v}"
          git push origin main
