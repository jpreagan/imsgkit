name: release-imsgd

on:
  push:
    tags:
      - "imsgd/v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            archive_suffix: darwin_amd64
          - runner: macos-15
            archive_suffix: darwin_arm64
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Derive version
        run: |
          version="${RELEASE_TAG#imsgd/}"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Inject version
        run: |
          perl -0pi -e 's/static let version = "dev"/static let version = "'"$VERSION"'"/' Sources/imsgd/Version.swift

      - name: Build release binary
        run: swift build -c release

      - name: Smoke test binary
        run: |
          got="$(./.build/release/imsgd version)"
          test "$got" = "$VERSION"

      - name: Package archive
        run: |
          mkdir -p dist
          archive="imsgd_${VERSION#v}_${{ matrix.archive_suffix }}.tar.gz"
          tar -C ./.build/release -czf "dist/$archive" imsgd
          shasum -a 256 "dist/$archive" | awk '{print $1}' > "dist/$archive.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imsgd-${{ matrix.archive_suffix }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive version
        run: |
          version="${RELEASE_TAG#imsgd/}"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/imsgd-artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p dist
          find /tmp/imsgd-artifacts -type f -maxdepth 2 -exec cp {} dist/ \;

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "imsgd $VERSION" \
              --notes "Release $VERSION"
          fi
          gh release upload "$RELEASE_TAG" dist/*.tar.gz --clobber

      - name: Clone tap repository
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/jpreagan/homebrew-tap.git" /tmp/homebrew-tap

      - name: Update Homebrew formula
        run: |
          /bin/bash scripts/render-imsgd-formula.sh \
            /tmp/homebrew-tap/Formula/imsgd.rb \
            "${VERSION#v}" \
            "$RELEASE_TAG" \
            "$(cat dist/imsgd_${VERSION#v}_darwin_amd64.tar.gz.sha256)" \
            "$(cat dist/imsgd_${VERSION#v}_darwin_arm64.tar.gz.sha256)"

      - name: Push tap update
        working-directory: /tmp/homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/imsgd.rb
          if git diff --cached --quiet; then
            echo "formula unchanged"
            exit 0
          fi
          git commit -m "imsgd ${VERSION#v}"
          git push origin main
